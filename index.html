<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="frame">
        <div class="top">
            <p>Etch-A-Sketch</p>
        </div>

            </div>

        </div>
        <div class="bottom"></div>
    </div>
    <script src="./script.js"></script>

</html>
