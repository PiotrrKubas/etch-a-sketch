<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="frame">
        <div class="top">
            <p>Etch-A-Sketch</p>
        </div>
        <div class="center">
            <div class="left">
                <div class="color-picker">
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                    <button class="btn-color"></button>
                </div>
                <div class="knob"></div>
            </div>
            <div class="screen"></div>
            <div class="right">
                <div class="options">
                    <button class="btn-size">Size selection</button>
                    <button class="btn-rainbow"></button>
                    <button class="btn-eraser"><svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"
                            fill="currentColor" class="bi bi-eraser" viewBox="0 0 16 16">
                            <path
                                d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828zm2.121.707a1 1 0 0 0-1.414 0L4.16 7.547l5.293 5.293 4.633-4.633a1 1 0 0 0 0-1.414zM8.746 13.547 3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293z" />
                        </svg>
                    </button>
                </div>
                <div class="knob"></div>
            </div>
        </div>
        <div class="bottom">
            <p>Etch-A-Sketch by </p>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
